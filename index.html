<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamza PFD - Fixed Horizon</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: Arial, sans-serif;
            overflow: hidden; color: #fff;
        }

        #start-btn {
            padding: 15px 30px; font-size: 18px;
            background-color: #333; border: 2px solid #00FF00;
            color: #00FF00; border-radius: 5px;
            cursor: pointer; font-weight: bold; z-index: 100;
        }

        #pfd-screen {
            width: 100vw; height: 100vh;
            position: relative; display: none;
            overflow: hidden;
        }

        /* Ufuk Elemanı - Artık Sadece Yukarı Aşağı Kayacak */
        #horizon-element {
            width: 100%; height: 600%;
            position: absolute; top: -250%; left: 0;
            transition: transform 0.05s linear;
        }

        #horizon-colors {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1e528e 50%, #5a3e2b 50%);
            position: absolute;
        }

        /* Derece Çizgileri */
        .pitch-line {
            position: absolute;
            left: 50%;
            width: 100px;
            height: 2px;
            background-color: white;
            transform: translateX(-50%);
        }

        .pitch-label {
            position: absolute;
            color: white;
            font-size: 16px;
            font-weight: bold;
            width: 40px;
            text-align: center;
        }

        /* Sabit Yan Göstergeler */
        .tape-container {
            position: absolute; width: 80px; height: 200px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid #555;
            z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #speed-tape { left: 10px; top: 50%; transform: translateY(-50%); }
        #alt-tape { right: 10px; top: 50%; transform: translateY(-50%); }
        .tape-val { font-size: 26px; font-weight: bold; color: #00FF00; }

        /* Sabit Uçak Sembolü (Sarı) */
        #aircraft-ref {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; height: 4px; z-index: 100;
        }
        .wing { position: absolute; background: #ffff00; height: 5px; width: 70px; box-shadow: 0 0 5px #000; }
        .left-wing { left: 0; }
        .right-wing { right: 0; }
        .nose-dot { position: absolute; left: 85px; top: -3px; width: 12px; height: 12px; background: #ffff00; border-radius: 50%; }

    </style>
</head>
<body>

    <button id="start-btn">SİSTEMLERİ BAŞLAT</button>

    <div id="pfd-screen">
        <div id="horizon-element">
            <div id="horizon-colors"></div>
            <div id="pitch-scale"></div>
        </div>

        <div id="speed-tape" class="tape-container">
            <span style="font-size: 12px; color: #aaa;">SPD</span>
            <span id="val-speed" class="tape-val">240</span>
            <span style="font-size: 10px; color: #aaa;">KTS</span>
        </div>

        <div id="alt-tape" class="tape-container">
            <span style="font-size: 12px; color: #aaa;">ALT</span>
            <span id="val-alt" class="tape-val">10500</span>
            <span style="font-size: 10px; color: #aaa;">FT</span>
        </div>

        <div id="aircraft-ref">
            <div class="wing left-wing"></div>
            <div class="nose-dot"></div>
            <div class="wing right-wing"></div>
        </div>
    </div>

    <script>
        const horizon = document.getElementById('horizon-element');
        const pitchScale = document.getElementById('pitch-scale');
        const startBtn = document.getElementById('start-btn');
        const screen = document.getElementById('pfd-screen');

        // Pitch Ladder Oluştur (10, 20, 30, 40 dereceler)
        function generatePitchScale() {
            for (let i = -40; i <= 40; i += 10) {
                if (i === 0) continue; 

                const line = document.createElement('div');
                line.className = 'pitch-line';
                // Her derece için 8 piksellik boşluk
                const yOffset = i * 8;
                line.style.top = `calc(50% - ${yOffset}px)`;

                // Sayıları ekle (Sol ve Sağ)
                [-75, 45].forEach(x => {
                    const label = document.createElement('div');
                    label.className = 'pitch-label';
                    label.innerText = Math.abs(i);
                    label.style.top = `calc(50% - ${yOffset + 10}px)`;
                    label.style.left = `calc(50% + ${x}px)`;
                    pitchScale.appendChild(label);
                });

                pitchScale.appendChild(line);
            }
        }

        generatePitchScale();

        function handleOrientation(event) {
            let beta = event.beta; // Telefonun dikey eğimi

            if (beta === null) return;

            // --- KALİBRASYON ---
            // Telefon tam dik (duvara bakar gibi) iken beta ~90 derecedir. 
            // Bu konumu 0 (ufuk tam ortada) yapıyoruz.
            let adjustedPitch = beta - 90;

            // Dikey kaydırma miktarı (Hassasiyet: 8)
            let pitchPx = adjustedPitch * 8; 

            // DİKKAT: Rotate (Roll) kaldırıldı! Sadece yukarı-aşağı (translateY)
            horizon.style.transform = `translateY(${pitchPx}px)`;

            // Sayıları güncelle (Simülasyon efekti)
            document.getElementById('val-speed').innerText = 240 + (Math.random() > 0.5 ? 1 : 0);
            document.getElementById('val-alt').innerText = 10500 - Math.round(adjustedPitch * 12);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        startBtn.style.display = 'none';
                        screen.style.display = 'block';
                    }
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startBtn.style.display = 'none';
                screen.style.display = 'block';
            }
        });
    </script>
</body>
</html>
