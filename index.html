<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamza PFD - Pro Edition</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; font-family: Arial, sans-serif;
            overflow: hidden; color: #fff;
        }

        #start-btn {
            padding: 15px 30px; font-size: 18px;
            background-color: #333; border: 2px solid #00FF00;
            color: #00FF00; border-radius: 5px;
            cursor: pointer; font-weight: bold; z-index: 100;
        }

        #pfd-screen {
            width: 100vw; height: 100vh;
            position: relative; display: none;
            overflow: hidden;
        }

        /* Hareketli Ufuk ve Derece Çizgileri */
        #horizon-element {
            width: 300%; height: 600%;
            position: absolute; top: -250%; left: -100%;
            transition: transform 0.05s linear;
        }

        #horizon-colors {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1e528e 50%, #5a3e2b 50%);
            position: absolute;
        }

        /* PITCH LADDER (Derece Çizgileri) */
        .pitch-line {
            position: absolute;
            left: 50%;
            width: 80px;
            height: 2px;
            background-color: white;
            transform: translateX(-50%);
        }

        .pitch-label {
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            width: 30px;
            text-align: center;
        }

        /* Yan Teypler (Hız ve İrtifa) */
        .tape-container {
            position: absolute; width: 70px; height: 200px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid #777;
            z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #speed-tape { left: 10px; top: 50%; transform: translateY(-50%); }
        #alt-tape { right: 10px; top: 50%; transform: translateY(-50%); }
        .tape-val { font-size: 24px; font-weight: bold; color: #00FF00; }

        /* Sabit Uçak Sembolü */
        #aircraft-ref {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 4px; z-index: 100;
        }
        .wing { position: absolute; background: #ffff00; height: 4px; width: 60px; box-shadow: 0 0 4px #000; }
        .left-wing { left: 0; }
        .right-wing { right: 0; }
        .nose-dot { position: absolute; left: 75px; top: -3px; width: 10px; height: 10px; background: #ffff00; border-radius: 50%; }

    </style>
</head>
<body>

    <button id="start-btn">SİSTEMLERİ BAŞLAT</button>

    <div id="pfd-screen">
        <div id="horizon-element">
            <div id="horizon-colors"></div>
            <div id="pitch-scale"></div>
        </div>

        <div id="speed-tape" class="tape-container">
            <span style="font-size: 10px;">SPD</span>
            <span id="val-speed" class="tape-val">240</span>
        </div>

        <div id="alt-tape" class="tape-container">
            <span style="font-size: 10px;">ALT</span>
            <span id="val-alt" class="tape-val">10500</span>
        </div>

        <div id="aircraft-ref">
            <div class="wing left-wing"></div>
            <div class="nose-dot"></div>
            <div class="wing right-wing"></div>
        </div>
    </div>

    <script>
        const horizon = document.getElementById('horizon-element');
        const pitchScale = document.getElementById('pitch-scale');
        const startBtn = document.getElementById('start-btn');
        const screen = document.getElementById('pfd-screen');

        // PITCH LADDER OLUŞTURUCU (10, 20, 30... Dereceler)
        function generatePitchScale() {
            // Merkezin (0 derece) konumu ekranın tam ortasıdır
            const centerOffset = window.innerHeight * 3; // horizon-element'in yarısı (basitleştirilmiş)
            
            for (let i = -50; i <= 50; i += 10) {
                if (i === 0) continue; // Ufuk çizgisi zaten gradient'in ortası

                const line = document.createElement('div');
                line.className = 'pitch-line';
                // 1 derece = 8 piksel kaydırma (CSS'teki hassasiyetle aynı olmalı)
                const yPos = 50 - (i * 0.4); // % cinsinden pozisyon (yaklaşık)
                
                // Daha hassas piksel bazlı yerleşim
                const topVal = `calc(50% - ${i * 8}px)`; 
                line.style.top = topVal;

                // Sol ve Sağ Sayılar
                [-60, 45].forEach(xOffset => {
                    const label = document.createElement('div');
                    label.className = 'pitch-label';
                    label.innerText = Math.abs(i);
                    label.style.top = `calc(50% - ${i * 8 + 10}px)`;
                    label.style.left = `calc(50% + ${xOffset}px)`;
                    pitchScale.appendChild(label);
                });

                pitchScale.appendChild(line);
            }
        }

        generatePitchScale();

        function handleOrientation(event) {
            let roll = event.gamma; 
            let beta = event.beta; // Telefonun dikey eğimi

            if (roll === null || beta === null) return;

            // --- KALİBRASYON ---
            // Telefon tam karşıya bakarken beta ~90 derecedir. Bunu 0 yapıyoruz.
            let adjustedPitch = beta - 90;

            // Hassasiyet çarpanı (8)
            let pitchPx = adjustedPitch * 8; 

            // Hem döndür hem dikey kaydır
            horizon.style.transform = `rotate(${-roll}deg) translateY(${pitchPx}px)`;

            // Görsel değerleri güncelle
            document.getElementById('val-speed').innerText = 240 + Math.round(Math.random());
            document.getElementById('val-alt').innerText = 10500 - Math.round(adjustedPitch * 15);
        }

        startBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        startBtn.style.display = 'none';
                        screen.style.display = 'block';
                    }
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startBtn.style.display = 'none';
                screen.style.display = 'block';
            }
        });
    </script>
</body>
</html>
